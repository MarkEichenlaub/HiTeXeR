<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiTeXeR - Interactive Asymptote Editor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/monokai.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e;
  color: #eee;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

#toolbar {
  background: #16213e;
  border-bottom: 2px solid #0f3460;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

#toolbar h1 {
  font-size: 18px;
  font-weight: 700;
  color: #e94560;
  margin-right: 16px;
  letter-spacing: 1px;
}

#toolbar button {
  background: #0f3460;
  color: #eee;
  border: 1px solid #1a1a5e;
  padding: 6px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: background 0.15s;
}

#toolbar button:hover { background: #1a1a5e; }
#toolbar button.primary { background: #e94560; border-color: #e94560; }
#toolbar button.primary:hover { background: #c73e54; }

#toolbar .status {
  margin-left: auto;
  font-size: 12px;
  color: #888;
}

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#editor-panel {
  width: 50%;
  display: flex;
  flex-direction: column;
  border-right: 2px solid #0f3460;
}

#editor-panel .CodeMirror {
  flex: 1;
  height: auto;
  font-size: 14px;
  line-height: 1.5;
}

#preview-panel {
  width: 50%;
  display: flex;
  flex-direction: column;
  background: #fff;
  position: relative;
}

#preview-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 20px;
}

#preview-container svg {
  max-width: 100%;
  max-height: 100%;
}

#preview-container .error {
  color: #e94560;
  font-family: monospace;
  font-size: 13px;
  white-space: pre-wrap;
  padding: 20px;
  background: #1a1a2e;
  border-radius: 4px;
  max-width: 90%;
}

#preview-container .placeholder {
  color: #999;
  font-size: 14px;
  text-align: center;
}

/* Highlight styles for code lines */
.cm-highlight-primary {
  background-color: #fff44f !important;
}

.cm-highlight-dependency {
  background-color: #fff9c4 !important;
}

/* SVG hover effects */
#preview-container svg path:hover,
#preview-container svg circle:hover,
#preview-container svg ellipse:hover,
#preview-container svg line:hover,
#preview-container svg polyline:hover,
#preview-container svg polygon:hover,
#preview-container svg rect:hover {
  filter: drop-shadow(0 0 3px rgba(233, 69, 96, 0.6));
  cursor: pointer;
}

/* Resizer */
#resizer {
  width: 4px;
  background: #0f3460;
  cursor: col-resize;
  flex-shrink: 0;
}
#resizer:hover { background: #e94560; }

/* Keyboard shortcut hint */
.shortcut-hint {
  font-size: 11px;
  color: #666;
  margin-left: 4px;
}
</style>
</head>
<body>

<div id="toolbar">
  <h1>HiTeXeR</h1>
  <button class="primary" id="btn-render" title="Ctrl+Enter">RENDER</button>
  <button id="btn-clear">CLEAR</button>
  <span class="status" id="status">Ready</span>
</div>

<div id="main">
  <div id="editor-panel">
    <textarea id="code-editor">[asy]
import geometry;
unitsize(1.0 cm);

// Triangle vertices
pair A, B, C;
A = (0, 0);
B = (4, 0);
C = (1.5, 3);

// Draw triangle sides
draw(A--B, linewidth(1.0bp));
draw(B--C, linewidth(1.0bp));
draw(C--A, linewidth(1.0bp));

// Incircle
real r = inradius(A, B, C);
pair I = incenter(A, B, C);
draw(circle(I, r), blue);

// Labels
label("$A$", A, SW);
label("$B$", B, SE);
label("$C$", C, N);
[/asy]</textarea>
  </div>
  <div id="resizer"></div>
  <div id="preview-panel">
    <div id="preview-container">
      <div class="placeholder">Press <b>Ctrl+Enter</b> or click <b>RENDER</b> to compile</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
<script>
// ============================================================
// Asymptote Parser - dependency tracking
// ============================================================
const AsyParser = {
  /**
   * Parse Asymptote code and return structured information about
   * draw commands and variable dependencies.
   */
  parse(code) {
    const lines = code.split('\n');
    const drawCommands = [];   // {lineIndex, lineText, vars}
    const assignments = [];    // {lineIndex, varName, lineText}
    const imports = [];        // {lineIndex, lineText}

    // Regex patterns
    const drawPattern = /^\s*(draw|fill|filldraw|label|dot|clip)\s*\(/;
    const assignPattern = /^\s*(?:(?:pair|real|int|pen|path|guide|picture|transform|string|bool)\s+)?([a-zA-Z_]\w*)\s*(?:\[\s*\])?\s*=/;
    const multiAssignPattern = /^\s*(?:pair|real|int|pen|path|guide|picture|transform|string|bool)\s+([a-zA-Z_]\w*(?:\s*,\s*[a-zA-Z_]\w*)*)\s*;/;
    const importPattern = /^\s*(import|access|from)\s+/;
    const sizePattern = /^\s*(unitsize|size)\s*\(/;
    const commentPattern = /^\s*\/\//;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const trimmed = line.trim();

      // Skip empty lines, comments, delimiters
      if (!trimmed || commentPattern.test(trimmed) ||
          trimmed === '[asy]' || trimmed === '[/asy]') continue;

      // Check for imports
      if (importPattern.test(trimmed)) {
        imports.push({ lineIndex: i, lineText: line });
        continue;
      }

      // Check for size/unitsize
      if (sizePattern.test(trimmed)) {
        imports.push({ lineIndex: i, lineText: line });
        continue;
      }

      // Check for draw commands (may span multiple lines)
      if (drawPattern.test(trimmed)) {
        const vars = this.extractVariables(trimmed, lines, i);
        drawCommands.push({ lineIndex: i, lineText: line, vars });
        continue;
      }

      // Check for variable assignments
      const assignMatch = trimmed.match(assignPattern);
      if (assignMatch) {
        assignments.push({
          lineIndex: i,
          varName: assignMatch[1],
          lineText: line,
        });
        continue;
      }

      // Check for multi-variable declarations like "pair A, B, C;"
      const multiMatch = trimmed.match(multiAssignPattern);
      if (multiMatch) {
        const varNames = multiMatch[1].split(',').map(v => v.trim());
        for (const vn of varNames) {
          assignments.push({ lineIndex: i, varName: vn, lineText: line });
        }
        continue;
      }
    }

    return { drawCommands, assignments, imports, lines };
  },

  /**
   * Extract variable names referenced in a draw command.
   * Looks at identifiers that aren't Asymptote built-in keywords.
   */
  extractVariables(lineText, allLines, lineIdx) {
    // Handle multi-line statements (find the complete statement)
    let fullStatement = lineText;
    let parenDepth = 0;
    for (const ch of lineText) {
      if (ch === '(') parenDepth++;
      if (ch === ')') parenDepth--;
    }
    let j = lineIdx + 1;
    while (parenDepth > 0 && j < allLines.length) {
      fullStatement += ' ' + allLines[j].trim();
      for (const ch of allLines[j]) {
        if (ch === '(') parenDepth++;
        if (ch === ')') parenDepth--;
      }
      j++;
    }

    // Extract identifiers
    const identifiers = fullStatement.match(/[a-zA-Z_]\w*/g) || [];

    // Filter out Asymptote keywords and built-in functions
    const builtins = new Set([
      'draw', 'fill', 'filldraw', 'label', 'dot', 'clip',
      'pair', 'real', 'int', 'pen', 'path', 'guide', 'picture', 'transform', 'string', 'bool',
      'cycle', 'true', 'false', 'null', 'new', 'return', 'if', 'else', 'for', 'while',
      'unitcircle', 'nullpath', 'nullpen',
      'black', 'white', 'red', 'green', 'blue', 'yellow', 'cyan', 'magenta',
      'orange', 'purple', 'brown', 'pink', 'gray', 'grey',
      'lightblue', 'lightgreen', 'lightred', 'lightyellow', 'lightgray', 'lightgrey',
      'darkblue', 'darkgreen', 'darkred', 'darkyellow', 'darkgray', 'darkgrey',
      'heavyblue', 'heavygreen', 'heavyred', 'heavyyellow', 'heavygray', 'heavygrey',
      'palered', 'paleblue', 'palegreen', 'paleyellow', 'palecyan', 'palemagenta',
      'deepblue', 'deepgreen', 'deepred', 'deepyellow', 'deepgray', 'deepgrey',
      'N', 'S', 'E', 'W', 'NE', 'NW', 'SE', 'SW', 'NNE', 'NNW', 'SSE', 'SSW',
      'ENE', 'WNW', 'ESE', 'WSW',
      'dir', 'sqrt', 'abs', 'sin', 'cos', 'tan', 'atan', 'atan2', 'log', 'exp',
      'min', 'max', 'floor', 'ceil', 'round',
      'linewidth', 'fontsize', 'dashed', 'dotted', 'solid', 'longdashed',
      'dashdotted', 'longdashdotted',
      'circle', 'arc', 'ellipse', 'box', 'shift', 'rotate', 'scale', 'reflect',
      'midpoint', 'extension', 'intersect', 'intersectionpoint', 'intersectionpoints',
      'incircle', 'circumcircle', 'incenter', 'circumcenter', 'inradius', 'circumradius',
      'foot', 'bisectorpoint', 'centroid', 'orthocenter',
      'length', 'angle', 'degrees', 'radians', 'unit', 'conj', 'expi',
      'xpart', 'ypart', 'point', 'relpoint', 'arclength',
      'currentpen', 'currentpicture', 'currentprojection',
      'fontcommand', 'Pen', 'Symbol', 'invisible',
      'MidArrow', 'Arrow', 'EndArrow', 'BeginArrow', 'Arrows', 'ArcArrow', 'ArcArrows',
      'bp', 'pt', 'cm', 'mm', 'inch',
      'import', 'access', 'from', 'include',
      'geometry', 'olympiad', 'cse5', 'graph', 'math', 'markers',
      'size', 'unitsize', 'defaultpen',
    ]);

    return [...new Set(identifiers.filter(id => !builtins.has(id)))];
  },

  /**
   * Given a draw command, find all lines it depends on.
   * Returns array of line indices.
   */
  findDependencies(drawCmd, assignments) {
    const deps = new Set();
    const visited = new Set();
    const queue = [...drawCmd.vars];

    while (queue.length > 0) {
      const varName = queue.shift();
      if (visited.has(varName)) continue;
      visited.add(varName);

      for (const assign of assignments) {
        if (assign.varName === varName) {
          deps.add(assign.lineIndex);
          // Find variables used in this assignment's RHS
          const rhs = assign.lineText.split('=').slice(1).join('=');
          const rhsVars = this.extractVariables(rhs, [rhs], 0);
          for (const rv of rhsVars) {
            if (!visited.has(rv)) queue.push(rv);
          }
        }
      }
    }
    return [...deps];
  },

  /**
   * Build full mapping: for each draw command index, get:
   * - primaryLine: the draw command's line index
   * - dependencyLines: array of dependency line indices
   */
  buildMapping(code) {
    const parsed = this.parse(code);
    const mapping = [];

    for (const cmd of parsed.drawCommands) {
      const depLines = this.findDependencies(cmd, parsed.assignments);
      mapping.push({
        primaryLine: cmd.lineIndex,
        dependencyLines: depLines,
        commandText: cmd.lineText.trim(),
      });
    }

    return { mapping, parsed };
  }
};

// ============================================================
// Editor Setup
// ============================================================
let editor;
let highlightMarks = [];

function initEditor() {
  editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
    mode: 'text/x-c++src',  // C-like mode works reasonably for Asymptote
    theme: 'monokai',
    lineNumbers: true,
    indentUnit: 2,
    tabSize: 2,
    matchBrackets: true,
    autoCloseBrackets: true,
    lineWrapping: false,
  });

  // Ctrl+Enter to render
  editor.setOption('extraKeys', {
    'Ctrl-Enter': doRender,
  });
}

function clearHighlights() {
  for (const mark of highlightMarks) {
    mark.clear();
  }
  highlightMarks = [];
}

function highlightLines(primaryLine, depLines) {
  clearHighlights();

  // Highlight dependencies in pale yellow
  for (const lineIdx of depLines) {
    const mark = editor.markText(
      { line: lineIdx, ch: 0 },
      { line: lineIdx, ch: editor.getLine(lineIdx).length },
      { className: 'cm-highlight-dependency' }
    );
    highlightMarks.push(mark);
  }

  // Highlight primary draw command in bright yellow
  const mark = editor.markText(
    { line: primaryLine, ch: 0 },
    { line: primaryLine, ch: editor.getLine(primaryLine).length },
    { className: 'cm-highlight-primary' }
  );
  highlightMarks.push(mark);

  // Scroll to the primary line
  editor.scrollIntoView({ line: primaryLine, ch: 0 }, 50);
}

// ============================================================
// Compilation
// ============================================================
const SERVER_URL = 'http://127.0.0.1:8080';

async function doRender() {
  const code = editor.getValue();
  const statusEl = document.getElementById('status');
  const previewEl = document.getElementById('preview-container');

  statusEl.textContent = 'Compiling...';
  statusEl.style.color = '#e9c46a';

  try {
    const resp = await fetch(`${SERVER_URL}/compile`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });

    const data = await resp.json();

    if (data.error) {
      previewEl.innerHTML = `<div class="error">${escapeHtml(data.error)}</div>`;
      statusEl.textContent = 'Compilation error';
      statusEl.style.color = '#e94560';
      return;
    }

    // Display SVG and set up interactivity
    previewEl.innerHTML = data.svg;
    setupSvgInteractivity(code);

    statusEl.textContent = 'Rendered successfully';
    statusEl.style.color = '#2ecc71';
  } catch (err) {
    previewEl.innerHTML = `<div class="error">Connection error: ${escapeHtml(err.message)}\n\nMake sure the server is running:\n  python server.py</div>`;
    statusEl.textContent = 'Server error';
    statusEl.style.color = '#e94560';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================================
// SVG Interactivity
// ============================================================
function setupSvgInteractivity(code) {
  const { mapping } = AsyParser.buildMapping(code);
  const svg = document.querySelector('#preview-container svg');
  if (!svg) return;

  // Find all drawable SVG elements (paths, circles, etc.)
  // These appear in the same order as draw commands in the source
  const svgElements = svg.querySelectorAll('path, circle, ellipse, line, polyline, polygon, rect');

  // Group SVG elements by draw command.
  // Each draw command may produce multiple SVG elements (e.g., label text = glyph paths).
  // Draw commands produce stroked paths; labels produce filled paths.
  // Strategy: match draw commands to SVG elements by type and order.
  const drawElements = [];  // stroked or filled elements grouped by command
  const elementToCommand = new Map();

  // Separate SVG elements into stroked (draw/fill commands) and filled (labels)
  const strokedEls = [];
  const filledEls = [];

  for (const el of svgElements) {
    const stroke = el.getAttribute('stroke');
    const fill = el.getAttribute('fill');
    const hasStroke = stroke && stroke !== 'none';
    const hasFill = fill && fill !== 'none';

    if (hasStroke) {
      strokedEls.push(el);
    } else if (hasFill || (!stroke && !fill)) {
      // Default fill is black if neither specified
      filledEls.push(el);
    }
  }

  // Match stroked elements to draw/fill/filldraw commands
  // Match filled elements to label/dot commands
  let strokedIdx = 0;
  let filledIdx = 0;

  for (let cmdIdx = 0; cmdIdx < mapping.length; cmdIdx++) {
    const cmd = mapping[cmdIdx];
    const cmdType = cmd.commandText.match(/^\s*(\w+)/)?.[1];

    if (cmdType === 'label' || cmdType === 'dot') {
      // Labels produce multiple filled paths (one per glyph).
      // Group consecutive filled elements until we hit the next command boundary.
      // Heuristic: labels produce paths that are close together spatially.
      // Simple approach: assign a batch of filled elements to each label.
      const batchStart = filledIdx;
      // For labels, we look for a cluster of small filled paths.
      // Grab elements until we've consumed a reasonable batch or run out.
      if (filledIdx < filledEls.length) {
        // Find how many glyphs this label has.
        // Simple heuristic: consume until a gap or until next label command.
        const remainingLabels = mapping.slice(cmdIdx + 1).filter(
          c => /^\s*(label|dot)/.test(c.commandText)
        ).length;
        const remainingFilledEls = filledEls.length - filledIdx;
        const elsPerLabel = remainingLabels > 0
          ? Math.max(1, Math.floor(remainingFilledEls / (remainingLabels + 1)))
          : remainingFilledEls;

        for (let k = 0; k < elsPerLabel && filledIdx < filledEls.length; k++) {
          elementToCommand.set(filledEls[filledIdx], cmdIdx);
          filledIdx++;
        }
      }
    } else {
      // draw/fill/filldraw commands produce stroked paths
      if (strokedIdx < strokedEls.length) {
        elementToCommand.set(strokedEls[strokedIdx], cmdIdx);
        strokedIdx++;
      }
    }
  }

  // Add hover listeners to all mapped elements
  for (const [el, cmdIdx] of elementToCommand) {
    // Make element more hoverable by adding transparent wider stroke
    el.style.pointerEvents = 'all';

    el.addEventListener('mouseenter', () => {
      const cmd = mapping[cmdIdx];
      highlightLines(cmd.primaryLine, cmd.dependencyLines);
      // Visual feedback on SVG element
      el.setAttribute('data-original-filter', el.style.filter || '');
      el.style.filter = 'drop-shadow(0 0 4px rgba(233, 69, 96, 0.8))';
    });

    el.addEventListener('mouseleave', () => {
      clearHighlights();
      el.style.filter = el.getAttribute('data-original-filter') || '';
    });
  }

  // Also handle hover on parent <g> elements that might contain multiple paths
  // for a single command
}

// ============================================================
// Panel Resizer
// ============================================================
function initResizer() {
  const resizer = document.getElementById('resizer');
  const editorPanel = document.getElementById('editor-panel');
  const previewPanel = document.getElementById('preview-panel');
  let isResizing = false;

  resizer.addEventListener('mousedown', (e) => {
    isResizing = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const containerWidth = document.getElementById('main').offsetWidth;
    const newWidth = (e.clientX / containerWidth) * 100;
    if (newWidth > 20 && newWidth < 80) {
      editorPanel.style.width = newWidth + '%';
      previewPanel.style.width = (100 - newWidth) + '%';
      editor.refresh();
    }
  });

  document.addEventListener('mouseup', () => {
    if (isResizing) {
      isResizing = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  initEditor();
  initResizer();

  document.getElementById('btn-render').addEventListener('click', doRender);
  document.getElementById('btn-clear').addEventListener('click', () => {
    editor.setValue('[asy]\n\n[/asy]');
    document.getElementById('preview-container').innerHTML =
      '<div class="placeholder">Press <b>Ctrl+Enter</b> or click <b>RENDER</b> to compile</div>';
    clearHighlights();
    document.getElementById('status').textContent = 'Ready';
    document.getElementById('status').style.color = '#888';
  });
});
</script>
</body>
</html>
